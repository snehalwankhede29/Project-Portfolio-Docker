apiVersion: apps/v1
kind: Deployment

metadata:
  name: portfolio-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio

        image: snehalwankhede291/portfolio-image:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000